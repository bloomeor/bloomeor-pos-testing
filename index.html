<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomeor POS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="main/images/logo/Bloomeor-logo.png">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #030712; 
            --bg-surface: #111827;
            --bg-surface-raised: rgba(31, 41, 55, 0.6);
            --primary: #D4AF37; 
            --primary-glow: rgba(212, 175, 55, 0.4);
            --text-primary: #F9FAFB;
            --text-muted: #9CA3AF;
            --border: rgba(255, 255, 255, 0.08);
            --whatsapp: #25D366;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-base); 
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.05), transparent 40%),
                              radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.05), transparent 40%);
            color: var(--text-primary); 
            overflow-x: hidden; 
            font-size: 14px;
        }

        h2, h3 { font-weight: 600; letter-spacing: -0.02em; }
        
        /* Inputs & Controls */
        input, select {
            width: 100%; padding: 12px 16px; margin-top: 6px;
            background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border);
            color: var(--text-primary); 
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(0,0,0,0.4);
        }

        /* Buttons */
        .btn-gold { 
            background: linear-gradient(135deg, var(--primary), #B08D35); 
            color: #000; font-weight: 600; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); filter: brightness(1.1); }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-wa { background: var(--whatsapp); color: white; font-weight: 600; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: var(--transition); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-wa:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* App Layout */
        #app-layout { display: flex; height: 100vh; }
        
        .sidebar { 
            width: 260px; background: #0A1128; /* Deep navy blue matching screenshot */
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            z-index: 10; overflow-y: auto;
        }
        .sidebar .logo { padding: 24px; display: flex; align-items: center; }
        
        .nav-header {
            color: #6B7280; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
            padding: 10px 24px; text-transform: uppercase; margin-top: 10px;
        }

        .nav-link { 
            padding: 14px 24px; display: flex; align-items: center; gap: 16px; 
            color: #E5E7EB; cursor: pointer; font-weight: 500; font-size: 0.95rem;
            transition: background 0.2s; text-decoration: none;
        }
        .nav-link i { font-size: 1.2rem; }
        .nav-link:hover { 
            background: rgba(255, 255, 255, 0.05); 
        }
        .nav-link.active { 
            background: #3B82F6; /* Solid bright blue from screenshot */
            color: #FFFFFF; 
        }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .topbar { 
            height: 72px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 32px; border-bottom: 1px solid var(--border); 
            background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); z-index: 5;
        }
        
        .view-container { flex: 1; padding: 32px; overflow-y: auto; }
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeSlideUp 0.4s ease-out forwards; }

        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Panels */
        .card { 
            background: var(--bg-surface-raised); backdrop-filter: blur(12px); 
            border: 1px solid var(--border); padding: 24px; 
            border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* POS Grid */
        .pos-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; height: 100%; align-items: start; }
        .pos-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding-right: 8px; }
        .pos-item { 
            background: var(--bg-surface); border: 1px solid var(--border); 
            padding: 20px; border-radius: var(--radius-md); cursor: pointer; 
            text-align: center; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pos-item:hover { 
            border-color: var(--primary); transform: translateY(-4px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); background: rgba(212, 175, 55, 0.05);
        }

        /* Modals & Alerts */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); width: 90%; max-width: 500px; padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #customAlert {
            position: fixed; top: 24px; right: -350px; width: 320px;
            background: var(--bg-surface); border-left: 4px solid var(--primary);
            padding: 16px 20px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999;
        }
        #customAlert.show { right: 24px; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

            <div class="nav-header">NAVIGATION</div>
            <div id="navMenu">

                <a class="nav-link" href="main/html/settings.html"><i class="ph ph-gear"></i> Settings</a>
            </div>

            <div class="nav-header" style="margin-top: auto;">SUPPORT</div>
            <div style="padding: 10px 24px; color: var(--text-muted); font-size: 0.85rem;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                    <i class="ph ph-phone" style="color: var(--primary);"></i>
                    <span>9902356539</span>
                </div>

            </div>

            <div class="topbar">
                <h3 style="color: var(--text-sub)">Point of Sale</h3>

    <!-- Modals -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal-card">
            <h3 style="margin-bottom:15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Complete Checkout</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label style="font-size: 0.8rem; color: var(--text-sub);">Customer Name</label>
                    <input type="text" id="custName" placeholder="Walk-in Customer" value="Walk-in Customer">
                </div>
                <div>
                    <label style="font-size: 0.8rem; color: var(--text-sub);">Phone (for WhatsApp)</label>
                    <input type="text" id="custPhone" placeholder="e.g. 9876543210">

            <label style="font-size: 0.8rem; color: var(--text-sub);">Payment Method</label>
            <select id="payMethod">
                <option value="Cash">Cash</option>
                <option value="UPI">UPI / Google Pay</option>
                <option value="Card">Credit/Debit Card</option>
            </select>

                <button class="btn-gold" id="confirmBtn" onclick="confirmPayment()"><i class="ph ph-check-circle"></i> Confirm Sale</button>
            </div>
            
            <div id="waActionBtn" style="display:none; margin-top: 15px;">
                <button class="btn-wa" onclick="openWhatsApp()"><i class="ph ph-whatsapp-logo"></i> Share Invoice on WhatsApp</button>
                <button class="btn-gold" style="margin-top:10px; background:transparent; border:1px solid var(--primary); color:var(--primary);" onclick="resetPOS()">Start New Sale</button>
            </div>
        </div>

    <script>
        let currentUser = null;
        let cart = [];
        let waLinkTemp = '';

        const showAlert = (title, msg) => {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            const al = document.getElementById('customAlert');
            al.classList.add('show');
            setTimeout(() => al.classList.remove('show'), 3000);
        };

        const nav = (page) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event && event.currentTarget && event.currentTarget.classList.add('active');
        };

        // Auto-initialize on load
        window.onload = () => {
            initApp();
        };

        const initApp = () => {
            loadProducts();
        };

        const loadProducts = () => {
            google.script.run.withSuccessHandler(data => {
                const grid = document.getElementById('posProductGrid');
                grid.innerHTML = data.filter(d => d.qty > 0).map(d => `
                    <div class="pos-item" onclick="addToCart('${d.id}', '${d.name}', ${d.sell_rate})">
                        <i class="ph ph-package" style="font-size:2.5rem; color:var(--text-sub); margin-bottom:10px;"></i>
                        <h4 style="font-size: 0.9rem; margin-bottom: 5px;">${d.name}</h4>
                        <strong style="color:var(--primary)">₹${d.sell_rate}</strong>
                    </div>
                `).join('');
            }).getServerData('products');
        };

        const addToCart = (id, name, rate) => {
            const existing = cart.find(c => c.id === id);
            if(existing) existing.qty++;
            else cart.push({id, name, rate, qty: 1});
            updateCart();
        };

        const updateCart = () => {
            let total = 0;
            const html = cart.map(c => {
                total += c.rate * c.qty;
                return `<div style="display:flex; justify-content:space-between; padding: 8px 0; font-size: 0.9rem;">
                    <span>${c.name} <strong>x${c.qty}</strong></span>
                    <span>₹${c.rate * c.qty}</span>
                </div>`;
            }).join('');
            document.getElementById('cartList').innerHTML = html || '<p style="color:var(--text-sub); text-align:center; margin-top:50px;">Cart is empty.</p>';
            document.getElementById('cartTotal').innerText = `₹${total}`;
        };

        const openPaymentModal = () => {
            if(cart.length === 0) return showAlert('Cart Empty', 'Add items to cart first.');
            document.getElementById('modalTotalDue').innerText = document.getElementById('cartTotal').innerText;
            document.getElementById('waActionBtn').style.display = 'none';
            document.getElementById('confirmBtn').style.display = 'flex';
            document.getElementById('paymentModal').style.display = 'flex';
        };

        const confirmPayment = () => {
            document.getElementById('confirmBtn').innerHTML = 'Processing...';
            document.getElementById('confirmBtn').disabled = true;
            
            const paymentData = {
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custPhone').value,
                customerEmail: document.getElementById('custEmail').value,
                method: document.getElementById('payMethod').value,
                type: 'Full'
            };
            
            const cartData = {
                items: cart,
                total: parseInt(document.getElementById('cartTotal').innerText.replace('₹',''))
            };
            
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    showAlert('Success', `Invoice ${res.invoiceId} saved!`);
                    
                    // Show WhatsApp Button
                    if(res.waLink) {
                        waLinkTemp = res.waLink;
                        document.getElementById('waActionBtn').style.display = 'block';
                        document.getElementById('confirmBtn').style.display = 'none';
                    } else {
                        resetPOS();
                    }
                    loadProducts(); // Refresh stock
                } else {
                    showAlert('Error', res.message);
                    document.getElementById('confirmBtn').innerHTML = 'Confirm Sale';
                    document.getElementById('confirmBtn').disabled = false;
                }
            }).processPOSCheckout(cartData, paymentData);
        };

        const openWhatsApp = () => {
            window.open(waLinkTemp, '_blank');
            resetPOS();
        };

        const resetPOS = () => {
            cart = [];
            updateCart();
            document.getElementById('custPhone').value = '';
            document.getElementById('custEmail').value = '';
            document.getElementById('paymentModal').style.display = 'none';
            document.getElementById('confirmBtn').innerHTML = '<i class="ph ph-check-circle"></i> Confirm Sale';
            document.getElementById('confirmBtn').disabled = false;
        };

        // Init Empty Cart view
        updateCart();

        // --- Data Submission ---
        const submitNewProduct = () => {
            const data = {
                name: document.getElementById('newProdName').value,
                category: document.getElementById('newProdCat').value,
                buy_rate: parseFloat(document.getElementById('newProdBuy').value),
                sell_rate: parseFloat(document.getElementById('newProdSell').value),
                qty: parseInt(document.getElementById('newProdQty').value)
            };
            if(!data.name || !data.sell_rate) return showAlert('Error', 'Name and Sell Rate are required.');
            
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    showAlert('Success', res.message);
                    document.getElementById('newProdName').value = '';
                    document.getElementById('newProdCat').value = '';
                    document.getElementById('newProdBuy').value = '';
                    document.getElementById('newProdSell').value = '';
                    document.getElementById('newProdQty').value = '';
                    loadProducts(); // Refresh POS grid in background
                } else showAlert('Error', res.message);
            }).saveProduct(data);
        };

        const submitNewCustomer = () => {
            const data = {
                name: document.getElementById('newCustName').value,
                phone: document.getElementById('newCustPhone').value,
                email: document.getElementById('newCustEmail').value
            };
            if(!data.name) return showAlert('Error', 'Customer Name is required.');
            
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    showAlert('Success', res.message);
                    document.getElementById('newCustName').value = '';
                    document.getElementById('newCustPhone').value = '';
                    document.getElementById('newCustEmail').value = '';
                } else showAlert('Error', res.message);
            }).saveCustomer(data);
        };
    </script>
</body>
